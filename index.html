<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Auralis</title>
<style>
  body {
    font-family: Arial, sans-serif;
    padding: 20px;
    max-width: 1100px;
    margin: 0 auto;
    line-height: 1.4;
    background: #fafafa;
  }

  h2 { margin-bottom: 8px; }
  p { margin-top: 0; color: #444; }

  textarea {
    width: 100%;
    min-height: 240px;
    font-size: 18px;
    padding: 14px;
    box-sizing: border-box;
    margin-bottom: 14px;
    border: 1px solid #ccc;
    border-radius: 10px;
    resize: vertical;
    background: white;
  }

  .row {
    display: flex;
    gap: 14px;
    flex-wrap: wrap;
    align-items: center;
    margin: 12px 0;
  }

  button, select, input {
    font-size: 16px;
    padding: 10px 12px;
  }

  label {
    display: inline-flex;
    align-items: center;
    gap: 8px;
  }

  #status {
    margin-top: 10px;
    font-weight: bold;
    padding: 10px 12px;
    background: white;
    border: 1px solid #ddd;
    border-radius: 8px;
  }

  #analysis {
    white-space: pre-wrap;
    background: white;
    padding: 14px;
    margin-top: 14px;
    font-size: 14px;
    border: 1px solid #ddd;
    border-radius: 10px;
    max-height: 420px;
    overflow: auto;
  }
</style>
</head>
<body>

<h2>Auralis</h2>
<p>Each word is now one combined event: notes and English start together, and the notes sustain until the spoken word finishes.</p>

<textarea id="text">why do you follow the strange signal from Commander Raleth beyond the silver ocean?</textarea>

<div class="row">
  <button id="startBtn">Start Audio</button>
  <button id="beepBtn">Test Beep</button>
  <button id="playBtn">Play Phrase</button>
  <button id="stopBtn">Stop</button>
</div>

<div class="row">
  <label>Waveform
    <select id="waveform">
      <option value="triangle">triangle</option>
      <option value="square" selected>square</option>
      <option value="sawtooth">sawtooth</option>
      <option value="sine">sine</option>
    </select>
  </label>

  <label>Playback Mode
    <select id="playMode">
      <option value="notes">notes only</option>
      <option value="notes_voice" selected>notes + robotic voice</option>
      <option value="voice">robotic voice only</option>
    </select>
  </label>

  <label>Speed
    <input id="speed" type="range" min="60" max="180" value="100">
  </label>
  <span id="speedValue">1.00x</span>
</div>

<div class="row">
  <label>Voice
    <select id="voiceSelect"></select>
  </label>

  <label>Voice Tone
    <input id="voicePitch" type="range" min="50" max="160" value="78">
  </label>
  <span id="voicePitchValue">0.78</span>
</div>

<div id="status">Status: not started</div>
<pre id="analysis">Press Start Audio, then Play Phrase.</pre>

<script>
let ctx = null;
let master = null;
let activeNodes = [];
let stopRequested = false;
let voicesCache = [];

// --------------------------------------------------
// CORE WORD CLASSES
// --------------------------------------------------
const FUNCTION_WORDS = new Set([
  "a","an","the","of","to","in","on","at","for","from","with","and","but","or",
  "if","then","so","as","by","we","i","you","he","she","it","they","do","does",
  "did","is","are","was","were","will","shall","not","no","our","your","their",
  "my","his","her","its","this","that","these","those","be","been","being",
  "am","can","could","should","would","may","might","must","me","us","them"
]);

const VERBS = new Set([
  "see","build","make","go","find","know","love","want","send","hear","follow",
  "move","leave","search","travel","listen","understand","remember","trust",
  "learn","speak","sing","call","watch","touch","hold","bring","carry","shape",
  "open","close","begin","end","rise","fall","change","create","destroy",
  "discover","explore","decode","observe","protect","guide","signal","return",
  "ask","answer","believe","imagine","become","cross","enter","escape","gather",
  "measure","translate","whisper","glow"
]);

const ADJECTIVES = new Set([
  "dangerous","bright","dark","new","silent","strange","beautiful","cold","warm",
  "distant","ancient","deep","unknown","powerful","fragile","hidden","golden",
  "vast","small","great","gentle","wild","broken","clear","shifting","electric",
  "harmonic","alien","human","living","empty","glowing","secret","endless",
  "silver","burning","quiet","soft","sharp","hollow","sacred"
]);

const NOUNS = new Set([
  "danger","water","home","signal","world","music","stars","star","machine",
  "system","light","space","truth","pattern","planet","sky","fire","memory",
  "ocean","river","forest","storm","wind","stone","metal","voice","language",
  "sun","moon","ship","bridge","door","path","dream","mind","heart",
  "energy","echo","shadow","time","future","past","code","message","name",
  "friend","enemy","city","mountain","field","song","wave","flame","night","day",
  "captain","commander","doctor","harbor","crystal"
]);

// --------------------------------------------------
// BASE SEEDED WORDS
// --------------------------------------------------
const seedLexicon = {
  we:         { type:"pronoun",  motif:[[48,55,60],[60,67]], amp:0.12 },
  i:          { type:"pronoun",  motif:[[48,60]], amp:0.11 },
  you:        { type:"pronoun",  motif:[[52,64]], amp:0.11 },
  they:       { type:"pronoun",  motif:[[50,62],[57,69]], amp:0.11 },

  do:         { type:"function", motif:[[50,62]], amp:0.08 },
  not:        { type:"negation", motif:[[36,48],[39,51]], amp:0.10 },
  the:        { type:"function", motif:[[47,59]], amp:0.07 },
  a:          { type:"function", motif:[[48,60]], amp:0.07 },
  and:        { type:"function", motif:[[52,64],[55,67]], amp:0.07 },

  see:        { type:"verb",     motif:[[62,69],[65,72],[57,64,69]], amp:0.13 },
  build:      { type:"verb",     motif:[[50,62],[55,67],[57,69,81]], amp:0.14 },
  love:       { type:"verb",     motif:[[60,67,72],[64,67,76],[55,67,79]], amp:0.14 },
  find:       { type:"verb",     motif:[[59,71],[64,76],[52,64,71]], amp:0.13 },
  follow:     { type:"verb",     motif:[[55,67],[59,71],[62,74,86]], amp:0.14 },
  hear:       { type:"verb",     motif:[[57,69],[60,72],[64,76,88]], amp:0.13 },

  danger:     { type:"noun",     motif:[[48,60,67],[49,61,73],[36,48,60]], amp:0.15 },
  dangerous:  { type:"adjective",motif:[[60,72],[61,73],[55,67,79]], amp:0.12 },
  water:      { type:"noun",     motif:[[53,65,77],[57,69],[52,64,76]], amp:0.13 },
  home:       { type:"noun",     motif:[[48,60,72],[55,67],[60,72,79]], amp:0.14 },
  signal:     { type:"noun",     motif:[[67,79],[71,83],[62,74,86]], amp:0.13 },
  world:      { type:"noun",     motif:[[43,55,67],[50,62],[55,67,79]], amp:0.14 },
  stars:      { type:"noun",     motif:[[72,84],[79,91],[76,88]], amp:0.13 },
  star:       { type:"noun",     motif:[[72,84],[79,91],[76,88]], amp:0.13 },
  light:      { type:"noun",     motif:[[72,84],[76,88],[79,91]], amp:0.13 },

  strange:    { type:"adjective",motif:[[58,70],[61,73],[55,67,79]], amp:0.11 },
  silent:     { type:"adjective",motif:[[52,64],[55,67],[48,60,72]], amp:0.10 },
  new:        { type:"adjective",motif:[[64,76],[69,81]], amp:0.10 },
  dark:       { type:"adjective",motif:[[45,57,69],[48,60],[40,52,64]], amp:0.11 }
};

// --------------------------------------------------
// BIG VOCAB
// --------------------------------------------------
const BIG_WORD_BANK = [
  "above","across","after","again","against","air","alive","alone","always","amber",
  "among","answer","arrival","ash","awake","away","balance","beam","become","before",
  "below","beneath","between","beyond","black","blue","body","boundary","breath","burn",
  "call","calm","captain","center","child","circle","clear","cloud","coast","color",
  "companion","crystal","current","dance","data","dawn","deep","desert","distance","drift",
  "east","edge","ember","empty","engine","entry","evening","everything","eye","face",
  "far","field","flare","flow","forest","form","frequency","friend","garden","gate",
  "glass","glow","gold","gravity","green","ground","guide","hand","harbor","harmony",
  "height","horizon","hour","human","ice","idea","image","inside","island","journey",
  "key","kind","king","lake","leaf","line","living","map","mark","mirror","morning",
  "motion","mountain","near","night","north","note","object","ocean","origin","outside",
  "peak","people","phase","plain","point","portal","presence","pulse","purple","queen",
  "quiet","range","red","reflection","response","road","room","root","sand","sea",
  "secret","shape","ship","shore","silver","sky","sleep","snow","south","spark",
  "spirit","spring","stone","story","stream","structure","summer","surface","symbol","task",
  "temple","thread","tone","tower","trace","trail","tree","valley","vision","voice",
  "wall","way","west","white","window","winter","word","yellow","young","zero",
  "doctor","raleth","solari","vaelith","orion","alexandria","mercer","evelyn","commander"
];

// --------------------------------------------------
// VOICES
// --------------------------------------------------
function getVoicePreferenceOrder() {
  return [
    /Google UK English Male/i,
    /Microsoft David/i,
    /Microsoft Mark/i,
    /Daniel/i,
    /Alex/i,
    /Fred/i,
    /Google US English/i,
    /Samantha/i
  ];
}

function populateVoiceOptions() {
  const select = document.getElementById("voiceSelect");

  if (!("speechSynthesis" in window)) {
    select.innerHTML = '<option value="">speech not supported</option>';
    return;
  }

  const voices = window.speechSynthesis.getVoices();
  voicesCache = voices;
  const english = voices.filter(v => /^en/i.test(v.lang));
  select.innerHTML = "";

  if (english.length === 0) {
    select.innerHTML = '<option value="">default browser voice</option>';
    return;
  }

  const priority = getVoicePreferenceOrder();

  english.sort((a, b) => {
    const ai = priority.findIndex(r => r.test(a.name));
    const bi = priority.findIndex(r => r.test(b.name));
    const av = ai === -1 ? 999 : ai;
    const bv = bi === -1 ? 999 : bi;
    return av - bv || a.name.localeCompare(b.name);
  });

  english.forEach(v => {
    const opt = document.createElement("option");
    opt.value = String(voices.indexOf(v));
    opt.textContent = `${v.name} (${v.lang})`;
    select.appendChild(opt);
  });

  const preferred = english.find(v =>
    /Google UK English Male|Microsoft David|Microsoft Mark|Daniel|Alex|Fred/i.test(v.name)
  ) || english[0];

  select.value = String(voices.indexOf(preferred));
}

function getSelectedVoice() {
  const idx = Number(document.getElementById("voiceSelect").value);
  if (!Number.isNaN(idx) && voicesCache[idx]) return voicesCache[idx];
  return null;
}

// --------------------------------------------------
// AUDIO UTILS
// --------------------------------------------------
function setStatus(msg) {
  document.getElementById("status").innerText = "Status: " + msg;
}

function clamp(n, min, max) {
  return Math.max(min, Math.min(max, n));
}

function midiToFreq(midi) {
  return 440 * Math.pow(2, (midi - 69) / 12);
}

function hashWord(word) {
  let h = 0;
  for (let i = 0; i < word.length; i++) {
    h = (h * 31 + word.charCodeAt(i)) >>> 0;
  }
  return h;
}

function cloneEntry(obj) {
  return JSON.parse(JSON.stringify(obj));
}

async function ensureAudio() {
  if (!ctx) {
    ctx = new (window.AudioContext || window.webkitAudioContext)();
    master = ctx.createGain();
    master.gain.value = 0.95;
    master.connect(ctx.destination);
  }
  if (ctx.state === "suspended") await ctx.resume();
  setStatus("audio ready");
}

function stopAll() {
  stopRequested = true;
  activeNodes.forEach(node => {
    try { node.stop(); } catch(e) {}
    try { node.disconnect(); } catch(e) {}
  });
  activeNodes = [];
  if ("speechSynthesis" in window) window.speechSynthesis.cancel();
  setStatus("stopped");
}

function startSustainedChord(freqs, gainAmt = 0.12, wave = "square") {
  const nodes = [];
  const now = ctx.currentTime;

  freqs.forEach((freq, idx) => {
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();

    osc.type = wave;
    osc.frequency.setValueAtTime(freq, now);

    gain.gain.setValueAtTime(0.0001, now);
    gain.gain.exponentialRampToValueAtTime(gainAmt, now + 0.015 + idx * 0.002);

    osc.connect(gain).connect(master);
    osc.start(now + idx * 0.002);

    nodes.push({ osc, gain });
    activeNodes.push(osc, gain);
  });

  return nodes;
}

function stopSustainedChord(nodes) {
  const now = ctx.currentTime;
  nodes.forEach(({ osc, gain }) => {
    try {
      gain.gain.cancelScheduledValues(now);
      gain.gain.setValueAtTime(Math.max(0.0001, gain.gain.value || 0.08), now);
      gain.gain.exponentialRampToValueAtTime(0.0001, now + 0.04);
      osc.stop(now + 0.05);
    } catch(e) {}
  });
}

function waitSec(sec) {
  return new Promise(resolve => setTimeout(resolve, Math.max(0, sec * 1000)));
}

// --------------------------------------------------
// WORD GENERATION
// --------------------------------------------------
function classify(word) {
  if (/^[?!,.;]$/.test(word)) return "punct";
  if (FUNCTION_WORDS.has(word)) return "function";
  if (VERBS.has(word)) return "verb";
  if (ADJECTIVES.has(word)) return "adjective";
  if (NOUNS.has(word)) return "noun";
  if (word.endsWith("ly")) return "adverb";
  if (word.endsWith("ing") || word.endsWith("ed")) return "verb";
  if (word.endsWith("ous") || word.endsWith("ful") || word.endsWith("ive") || word.endsWith("al")) return "adjective";
  if (word.endsWith("tion") || word.endsWith("ness") || word.endsWith("ment") || word.endsWith("ship")) return "noun";
  return "noun";
}

function makeKnownEntry(word) {
  const h = hashWord(word);
  const type = classify(word);
  const root = 40 + (h % 26);

  const major      = [root, root + 4, root + 7];
  const minor      = [root, root + 3, root + 7];
  const sus        = [root, root + 5, root + 7];
  const octaveMaj  = [root, root + 12, root + 16, root + 19];
  const octaveMin  = [root, root + 12, root + 15, root + 19];
  const bright     = [root + 7, root + 19, root + 23];
  const dark       = [root - 5, root + 7, root + 19];
  const upper      = [root + 12, root + 19];
  const upperWide  = [root + 12, root + 24];
  const cluster    = [root, root + 1, root + 7, root + 12];

  if (type === "function") {
    return { type, motif: [[root, root + 12], [root + 7, root + 19]], amp: 0.07 };
  }
  if (type === "verb") {
    return {
      type,
      motif: [
        (h % 2 ? octaveMin : octaveMaj),
        (h % 3 ? bright : sus),
        (h % 5 ? [root + 5, root + 17, root + 24] : dark),
        (h % 7 ? major : minor)
      ],
      amp: 0.13
    };
  }
  if (type === "adjective") {
    return {
      type,
      motif: [
        upper,
        (h % 2 ? octaveMaj : octaveMin),
        (h % 3 ? [root + 5, root + 17] : bright)
      ],
      amp: 0.10
    };
  }
  if (type === "adverb") {
    return {
      type,
      motif: [
        upperWide,
        [root + 7, root + 19],
        [root + 12, root + 16, root + 24],
        [root + 5, root + 17, root + 22]
      ],
      amp: 0.09
    };
  }
  return {
    type: "noun",
    motif: [
      (h % 2 ? octaveMaj : octaveMin),
      (h % 3 ? [root + 5, root + 17] : bright),
      (h % 5 ? dark : cluster),
      (h % 7 ? major : minor)
    ],
    amp: 0.12
  };
}

function makeUnknownEntry(word) {
  const h = hashWord(word);
  const root = 36 + (h % 30);
  const parts = Math.max(2, Math.min(5, Math.ceil(word.length / 3)));

  const choices = [
    [root, root + 12, root + 19],
    [root, root + 12, root + 15, root + 19],
    [root + 5, root + 17, root + 24],
    [root + 7, root + 19, root + 23],
    [root - 5, root + 7, root + 19],
    [root, root + 1, root + 7, root + 12],
    [root + 12, root + 24],
    [root + 4, root + 16, root + 23]
  ];

  const motif = [];
  for (let i = 0; i < parts + 1; i++) {
    const pick = choices[(h + i * 3) % choices.length].map(n =>
      clamp(n + ((i % 2) ? 2 : 0), 30, 96)
    );
    motif.push(pick);
  }

  return { type: "unknown", motif, amp: 0.14 };
}

const lexicon = {};
Object.keys(seedLexicon).forEach(k => { lexicon[k] = cloneEntry(seedLexicon[k]); });
BIG_WORD_BANK.forEach(word => { if (!lexicon[word]) lexicon[word] = makeKnownEntry(word); });
for (const base of BIG_WORD_BANK) {
  for (const v of [base + "s", base + "ed", base + "ing"]) {
    if (!lexicon[v]) lexicon[v] = makeKnownEntry(v);
  }
}

function getEntry(word) {
  if (lexicon[word]) return cloneEntry(lexicon[word]);
  return makeUnknownEntry(word);
}

function shapeEntry(word, entry, position, totalWords, isQuestion, isExclaim) {
  const type = entry.type;
  const progress = totalWords <= 1 ? 0 : position / (totalWords - 1);

  let transpose = 0;
  if (isQuestion) transpose = Math.round(progress * 5);
  else transpose = Math.round((0.35 - progress) * 2);
  if (isExclaim) transpose += 2;

  entry.motif = entry.motif.map(chord => chord.map(n => clamp(n + transpose, 30, 96)));

  if (position === totalWords - 1 && isQuestion) {
    entry.motif = entry.motif.map((chord, idx) =>
      chord.map(n => clamp(n + 3 + idx, 30, 96))
    );
    entry.amp *= 1.10;
  }

  return entry;
}

function tokenize(text) {
  return text.match(/[a-zA-Z']+|[?!,.;]/g) || [];
}

// --------------------------------------------------
// SPEECH: WAIT FOR WORD TO END
// --------------------------------------------------
function speakWordAndWait(word, speedMul, isQuestionLastWord = false) {
  return new Promise(resolve => {
    if (!("speechSynthesis" in window)) {
      resolve();
      return;
    }

    const utter = new SpeechSynthesisUtterance(word);
    utter.rate = 1.0 * speedMul;
    utter.pitch = Number(document.getElementById("voicePitch").value) / 100;
    utter.volume = 0.9;

    const selectedVoice = getSelectedVoice();
    if (selectedVoice) utter.voice = selectedVoice;

    if (isQuestionLastWord) {
      utter.pitch = Math.min(2, utter.pitch + 0.22);
      utter.rate = Math.max(0.8, utter.rate * 0.96);
    }

    utter.onend = () => resolve();
    utter.onerror = () => resolve();

    window.speechSynthesis.speak(utter);
  });
}

function estimateNotesOnlyDuration(entry, speedMul, isQuestionLastWord = false) {
  let base = 0.16 + entry.motif.length * 0.09;
  if (entry.type === "function") base *= 0.7;
  if (entry.type === "verb") base *= 1.1;
  if (entry.type === "unknown") base *= 1.15;
  if (isQuestionLastWord) base *= 1.15;
  return base / speedMul;
}

// --------------------------------------------------
// PLAYBACK
// --------------------------------------------------
async function play() {
  await ensureAudio();
  stopAll();
  stopRequested = false;

  const rawText = document.getElementById("text").value.trim();
  const waveform = document.getElementById("waveform").value;
  const playMode = document.getElementById("playMode").value;
  const speedMul = Number(document.getElementById("speed").value) / 100;

  const tokens = tokenize(rawText);
  const wordsOnly = tokens.filter(t => !/^[?!,.;]$/.test(t));
  const lowerWords = wordsOnly.map(w => w.toLowerCase());

  const firstWord = lowerWords[0] || "";
  const isQuestion = tokens.includes("?") || ["why","what","how","where","who","when"].includes(firstWord);
  const isExclaim = tokens.includes("!");

  const analysis = [];

  for (let i = 0, wordIndex = 0; i < tokens.length; i++) {
    if (stopRequested) return;

    const token = tokens[i];

    if (token === "," || token === ";") {
      const pause = (token === "," ? 0.10 : 0.16) / speedMul;
      await waitSec(pause);
      continue;
    }

    if (token === ".") {
      await waitSec(0.18 / speedMul);
      continue;
    }

    if (token === "?" || token === "!") continue;

    const lower = token.toLowerCase();
    let entry = getEntry(lower);
    entry = shapeEntry(lower, entry, wordIndex, wordsOnly.length, isQuestion, isExclaim);

    const isLastWord = wordIndex === wordsOnly.length - 1;

    const freqs = entry.motif.flat().map(midiToFreq);
    const uniqueFreqs = [...new Set(freqs.map(f => f.toFixed(3)))].map(Number);

    let sustainedNodes = [];
    if (playMode !== "voice") {
      sustainedNodes = startSustainedChord(
        uniqueFreqs,
        Math.min(0.16, entry.amp || 0.12),
        waveform
      );
    }

    if (playMode === "notes_voice") {
      await speakWordAndWait(token, speedMul, isQuestion && isLastWord);
    } else if (playMode === "voice") {
      await speakWordAndWait(token, speedMul, isQuestion && isLastWord);
    } else {
      await waitSec(estimateNotesOnlyDuration(entry, speedMul, isQuestion && isLastWord));
    }

    if (playMode !== "voice") {
      stopSustainedChord(sustainedNodes);
      await waitSec(0.045 / speedMul);
    }

    let tailGap = 0.02 / speedMul;
    if (entry.type === "function") tailGap = 0.01 / speedMul;
    if (entry.type === "noun") tailGap = 0.03 / speedMul;
    if (entry.type === "verb") tailGap = 0.025 / speedMul;

    await waitSec(tailGap);

    const source = lexicon[lower] ? "known" : "fallback";
    analysis.push(
      `${token} | ${entry.type} | ${source} | sustained with voice lock | ` +
      entry.motif.map(ch => "[" + ch.join(",") + "]").join(" ")
    );

    wordIndex++;
  }

  if (!stopRequested && playMode !== "voice") {
    if (isQuestion) {
      const endNodes = startSustainedChord(
        [midiToFreq(71), midiToFreq(83), midiToFreq(88)],
        0.11,
        waveform
      );
      await waitSec(0.28 / speedMul);
      stopSustainedChord(endNodes);
    } else if (isExclaim) {
      const endNodes = startSustainedChord(
        [midiToFreq(72), midiToFreq(84), midiToFreq(88)],
        0.12,
        waveform
      );
      await waitSec(0.24 / speedMul);
      stopSustainedChord(endNodes);
    } else {
      const endNodes = startSustainedChord(
        [midiToFreq(60), midiToFreq(72), midiToFreq(79)],
        0.10,
        waveform
      );
      await waitSec(0.22 / speedMul);
      stopSustainedChord(endNodes);
    }
  }

  document.getElementById("analysis").innerText =
    `Built-in vocabulary size: ${Object.keys(lexicon).length}\n` +
    `Playback mode: ${playMode}\n` +
    `Question detected: ${isQuestion}\n` +
    `Global speed: ${speedMul.toFixed(2)}x\n\n` +
    analysis.join("\n");

  if (!stopRequested) {
    setStatus("finished");
  }
}

// --------------------------------------------------
// UI
// --------------------------------------------------
document.getElementById("speed").addEventListener("input", e => {
  document.getElementById("speedValue").innerText = (Number(e.target.value) / 100).toFixed(2) + "x";
});

document.getElementById("voicePitch").addEventListener("input", e => {
  document.getElementById("voicePitchValue").innerText = (e.target.value / 100).toFixed(2);
});

document.getElementById("startBtn").addEventListener("click", async () => {
  await ensureAudio();
  if ("speechSynthesis" in window) {
    window.speechSynthesis.getVoices();
    populateVoiceOptions();
  }
});

document.getElementById("beepBtn").addEventListener("click", async () => {
  await ensureAudio();
  const testNodes = startSustainedChord([440,660,880], 0.12, "square");
  await waitSec(0.25);
  stopSustainedChord(testNodes);
  setStatus("beep played");
});

document.getElementById("playBtn").addEventListener("click", play);
document.getElementById("stopBtn").addEventListener("click", stopAll);

if ("speechSynthesis" in window) {
  window.speechSynthesis.onvoiceschanged = populateVoiceOptions;
  populateVoiceOptions();
}
</script>

</body>
</html>
